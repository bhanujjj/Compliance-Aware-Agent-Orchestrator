version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./sentinel:/app/sentinel
    environment:
      - PYTHONUNBUFFERED=1

  frontend:
    build:
      context: ./sentinel/dashboard/ui
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./sentinel/dashboard/ui/src:/app/src
    environment:
      - NODE_ENV=development
    depends_on:
      - backend
